<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elite AutoMsg - Customer Portal</title>
    <style>
        * { box-sizing: border-box; }
        body { 
            font-family: 'Inter', 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            margin: 0; 
            padding: 0; 
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-image: url('bg-image.jpg');
            background-size: cover;
            background-position: center;
            position: relative;
            overflow: hidden;
        }
        
        body::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background-color: rgba(0, 0, 0, 0.5); /* Dark overlay so the card stands out */
            z-index: 0;
        }

        /* Background Shapes (Hidden since we have a full background image now) */
        .shape { display: none; }
        .shape-1 {
            width: 400px; height: 400px;
            background-color: rgba(14, 165, 233, 0.3);
            top: -100px; left: -100px;
        }
        .shape-2 {
            width: 300px; height: 300px;
            background-color: rgba(34, 197, 94, 0.2);
            bottom: -50px; right: -50px;
        }

        .login-container {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.5);
            border-radius: 20px;
            padding: 50px 40px;
            width: 100%;
            max-width: 420px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.08);
            z-index: 1;
            text-align: center;
        }

        .logo-container {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            margin-bottom: 10px;
        }
        .logo-container svg {
            width: 36px;
            height: 36px;
            fill: #25D366; /* Official WhatsApp Color */
        }
        .logo-container h1 {
            margin: 0;
            font-size: 28px;
            color: #1e293b;
            letter-spacing: -0.5px;
        }

        .login-container p.subtitle {
            color: #64748b;
            font-size: 15px;
            margin-bottom: 35px;
        }

        .input-group {
            margin-bottom: 20px;
            text-align: left;
        }
        .input-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #475569;
            font-size: 14px;
        }
        .input-group input {
            width: 100%;
            padding: 14px 16px;
            border: 1px solid #e2e8f0;
            border-radius: 10px;
            font-size: 15px;
            transition: all 0.3s ease;
            background-color: #f8fafc;
            color: #0f172a;
        }
        .input-group input:focus {
            outline: none;
            border-color: #25D366;
            box-shadow: 0 0 0 4px rgba(37, 211, 102, 0.15);
            background-color: #ffffff;
        }

        .error-message {
            color: #ef4444;
            font-size: 14px;
            margin-bottom: 20px;
            display: none;
            background-color: #fef2f2;
            padding: 12px;
            border-radius: 8px;
            border: 1px solid #fecaca;
        }

        .btn-login {
            width: 100%;
            padding: 15px;
            background-color: #25D366;
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s ease;
            box-shadow: 0 4px 10px rgba(37, 211, 102, 0.3);
            margin-top: 10px;
        }
        .btn-login:hover {
            background-color: #128C7E;
            transform: translateY(-2px);
            box-shadow: 0 6px 15px rgba(37, 211, 102, 0.4);
        }
        
        .footer-text {
            text-align: center;
            margin-top: 25px;
            font-size: 13px;
            color: #94a3b8;
        }
        .footer-text a {
            color: #25D366;
            text-decoration: none;
            font-weight: 500;
        }
        .footer-text a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>

    <div class="shape shape-1"></div>
    <div class="shape shape-2"></div>

    <div class="login-container">
        <div class="logo-container">
            <!-- WhatsApp SVG Logo -->
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 448 512">
                <path d="M380.9 97.1C339 55.1 283.2 32 223.9 32c-122.4 0-222 99.6-222 222 0 39.1 10.2 77.3 29.6 111L0 480l117.7-30.9c32.4 17.7 68.9 27 106.1 27h.1c122.3 0 224.1-99.6 224.1-222 0-59.3-25.2-115-67.1-157.1zm-157 341.6c-33.2 0-65.7-8.9-94-25.7l-6.7-4-69.8 18.3L72 359.2l-4.4-7c-18.5-29.4-28.2-63.3-28.2-98.2 0-101.7 82.8-184.5 184.6-184.5 49.3 0 95.6 19.2 130.4 54.1 34.8 34.9 56.2 81.2 56.1 130.5 0 101.8-84.9 184.6-186.6 184.6zm101.2-138.2c-5.5-2.8-32.8-16.2-37.9-18-5.1-1.9-8.8-2.8-12.5 2.8-3.7 5.6-14.3 18-17.6 21.8-3.2 3.7-6.5 4.2-12 1.4-32.6-16.3-54-29.1-75.5-66-5.7-9.8 5.7-9.1 16.3-30.3 1.8-3.7.9-6.9-.5-9.7-1.4-2.8-12.5-30.1-17.1-41.2-4.5-10.8-9.1-9.3-12.5-9.5-3.2-.2-6.9-.2-10.6-.2-3.7 0-9.7 1.4-14.8 6.9-5.1 5.6-19.4 19-19.4 46.3 0 27.3 19.9 53.7 22.6 57.4 2.8 3.7 39.1 59.7 94.8 83.8 35.2 15.2 49 16.5 66.6 13.9 10.7-1.6 32.8-13.4 37.4-26.4 4.6-13 4.6-24.1 3.2-26.4-1.3-2.5-5-3.9-10.5-6.6z"/>
            </svg>
            <h1>Elite AutoMsg</h1>
        </div>
        <p class="subtitle">Sign in to manage your messaging campaigns.</p>

        <div class="error-message" id="errorMsg">Invalid credentials. Please try again.</div>

        <form id="loginForm">
            <div class="input-group">
                <label for="username">Contact Number (User ID)</label>
                <input type="text" id="username" placeholder="e.g. 9876543210" required autocomplete="username">
            </div>
            
            <div class="input-group">
                <label for="password">Password</label>
                <input type="password" id="password" placeholder="••••••••" required autocomplete="current-password">
                <div style="text-align: right; margin-top: 8px;">
                    <a href="#" id="forgotPasswordBtn" style="color: #25D366; text-decoration: none; font-size: 13px; font-weight: 500;">Forgot Password?</a>
                </div>
            </div>

            <button type="submit" class="btn-login">Sign In to Dashboard</button>
        </form>
        
        <div class="footer-text">
            Don't have an account? <a href="#">Contact Support</a>
        </div>
    </div>
    <!-- Firebase SDK (Modular) -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, sendPasswordResetEmail } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, collection, query, where, getDocs } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        // TODO: Replace with your actual Firebase project configuration
        const firebaseConfig = {
          apiKey: "AIzaSyAKKjwBT-oSbuVRCgpKWHho6ygmxmpekRo",
          authDomain: "automsgelite.firebaseapp.com",
          projectId: "automsgelite",
          storageBucket: "automsgelite.firebasestorage.app",
          messagingSenderId: "864620129643",
          appId: "1:864620129643:web:51463579e4906119dcf02e",
          measurementId: "G-RCKGFS6W5W"
        };

        // Initialize Firebase
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // Authentication API Logic
        document.getElementById('loginForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const btn = document.querySelector('.btn-login');
            const originalText = btn.innerText;
            btn.innerText = "Signing in...";
            btn.disabled = true;

            const userInputValue = document.getElementById('username').value;
            const pass = document.getElementById('password').value;
            const errorMsg = document.getElementById('errorMsg');

            // Firebase Email/Password Auth requires a valid email string.
            // Since the input label suggests a "Contact Number", we handle both:
            // If they enter an email, use it. Otherwise, append a dummy domain.
            const email = userInputValue.includes('@') ? userInputValue : `${userInputValue}@eliteautomsg.com`;

            try {
                // Sign in with Firebase
                const userCredential = await signInWithEmailAndPassword(auth, email, pass);
                
                // Fetch full user profile from Firestore
                const q = query(collection(db, "users"), where("email", "==", email));
                const querySnapshot = await getDocs(q);
                
                let userProfile = { uid: userCredential.user.uid, email: userCredential.user.email };
                if (!querySnapshot.empty) {
                    const doc = querySnapshot.docs[0];
                    userProfile = doc.data();
                    userProfile.id = doc.id; // Inject the document ID so dashboard can query by user.id
                }

                errorMsg.style.display = 'none';
                localStorage.setItem('elite_auth', 'true');
                localStorage.setItem('elite_user', JSON.stringify(userProfile));
                window.location.href = '/dashboard.html';
                
            } catch(err) {
                errorMsg.style.display = 'block';
                // User-friendly error mapping
                if (err.code === 'auth/invalid-credential' || err.code === 'auth/user-not-found' || err.code === 'auth/wrong-password') {
                    errorMsg.innerText = "Invalid credentials. Please try again.";
                } else if (err.code === 'auth/invalid-email') {
                    errorMsg.innerText = "Invalid email/number format.";
                } else {
                    errorMsg.innerText = err.message || "Authentication error.";
                }
            }
            
            btn.innerText = originalText;
            btn.disabled = false;
        });

        // Forgot Password Logic
        document.getElementById('forgotPasswordBtn').addEventListener('click', async function(e) {
            e.preventDefault();
            const userInputValue = document.getElementById('username').value.trim();
            if (!userInputValue) {
                alert("Please enter your Contact Number or Email first.");
                return;
            }
            
            const email = userInputValue.includes('@') ? userInputValue : `${userInputValue}@eliteautomsg.com`;
            const errorMsg = document.getElementById('errorMsg');
            
            try {
                await sendPasswordResetEmail(auth, email);
                errorMsg.style.display = 'block';
                errorMsg.style.backgroundColor = '#dcfce7';
                errorMsg.style.borderColor = '#bbf7d0';
                errorMsg.style.color = '#166534';
                errorMsg.innerText = "Password reset link sent to your email!";
            } catch (err) {
                errorMsg.style.display = 'block';
                errorMsg.style.backgroundColor = '#fef2f2';
                errorMsg.style.borderColor = '#fecaca';
                errorMsg.style.color = '#ef4444';
                errorMsg.innerText = "Error sending reset link: " + err.message;
            }
        });

        // Listen for Firebase auth state changes
        onAuthStateChanged(auth, (user) => {
            if (user || localStorage.getItem('elite_auth') === 'true') {
                window.location.href = '/dashboard.html';
            }
        });
    </script>

</body>
</html>
